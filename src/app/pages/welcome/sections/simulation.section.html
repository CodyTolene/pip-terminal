<pip-title h2>Simulation Terminals</pip-title>
<p class="simulation-cta-body">
  Pip-Boy inspired interfaces built for immersion and roleplay.
</p>
<div class="simulation-cta" aria-label="Simulation terminals">
  <span class="simulation-cta-badge">External Site</span>
  <a
    class="simulation-cta-button"
    [href]="simulationUrl"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Open Pip-Boy Simulators in a new tab"
    (click)="trackSimulationClick()"
  >
    Open Pip-Boy Simulators
  </a>
  <div class="simulation-cta-notes">
    <span>Opens in a new tab.</span>
    <span
      >Free to use, always ad free. Built from scratch. No official
      assets.</span
    >
  </div>
</div>
